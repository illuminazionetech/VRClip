name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Kotlin formatting
        # Non-blocking: a large pre-existing part of the codebase predates this check and
        # isn't ktfmt-clean yet. Still runs and reports so drift is visible, without blocking
        # PRs on formatting debt unrelated to their own changes.
        continue-on-error: true
        run: ./gradlew ktfmtCheck

      - name: Run Android Lint
        run: ./gradlew lintGenericDebug

  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Free disk space
        # The app bundles several sizeable native libraries per ABI split (ffmpeg, python,
        # aria2c, Meta Spatial SDK) across 2 flavors x 2 build types; on a stock ubuntu-latest
        # runner this has intermittently exhausted disk mid-build and failed packaging with an
        # opaque IncrementalSplitterRunnable error. Clearing unrelated preinstalled toolchains
        # frees tens of GB before Gradle starts.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Run Tests
        run: ./gradlew test

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Build Debug APKs
        # Debug APKs are only a convenience CI artifact for manual QA, not required to publish
        # the release (only the release APKs below are attached to it) — don't let a debug-only
        # packaging issue block the release.
        continue-on-error: true
        run: ./gradlew assembleDebug

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: VRClip-Release-APKs
          path: app/build/outputs/apk/*/release/*.apk

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: VRClip-Debug-APKs
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: ignore

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VRClip ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/generic/release/*.apk
            app/build/outputs/apk/githubPreview/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
